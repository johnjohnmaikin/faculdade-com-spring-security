<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1"
    >

    <title>Cadastramento</title>

    <link rel="stylesheet" th:href="@{/form.css}" href="/static/form.css" >

    <link href= "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous"
    >

</head>

<body>
<nav class="navbar navbar-expand-lg bg-black" data-bs-theme="dark">
    <a class="navbar-brand text-white" href="#">C&C</a>
    <a class="navbar-brand text-white" href="#">Autorização de Usuários</a>
</nav>
<div class="div-geral">
    <div class="div-pai-form">
        <form method="POST" class="form" th:action="@{/atualizar}" th:object="${cheio}">
            <div class="div-msg">
                <p th:text="${situacao}" style="color:green;"></p>
            </div>
            <fieldset class="fildset">

                <div class="first-line">

                    <div class="div-nome div-inputs">
                        <label for="nome" class="texts-form">Nome:</label>
                        <br>
                        <input type="text" id="nome" placeholder="digite seu nome" class="inputs_form" name="nome" th:field="*{username}">
                    </div>

                    <div class="div-situacao div-inputs">
                        <label for="situacao" class="texts-form">Situação:</label>
                        <br>
                        <select id="situacao" class="inputs_form" name="situacao">
                            <option value="ativo" th:selected="*{ativo} == true">Ativo</option>
                            <option value="inativo" th:selected="*{ativo} == false">Inativo</option>
                        </select>
                    </div>

                    <div class="div-data-nascimento div-inputs">
                        <label for="data-nascimento" class="texts-form">Data de Nascimento:</label>
                        <br>
                        <input type="text" class="inputs_form data-nascimento" id="data-nascimento" name="data_nascimento" placeholder="Digite a data nasc." th:field="*{data_nascimento}" >
                    </div>
                </div>

                <div class="secund-line">
                    <div class="div-nome div-inputs">
                        <label for="cpf" class="texts-form">CPF:</label>
                        <br>
                        <input type="text" id="cpf" placeholder="digite seu cpf" class="inputs_form cpf" name="cpf" th:field="*{cpf}" >
                    </div>

                    <div class="div-sobrenome div-inputs">
                        <label for="endereco" class="texts-form">Endereço:</label >
                        <br>
                        <input type="text" id="endereco" placeholder="digite seu endereco" class="inputs_form" name="endereco" th:field="*{endereco}">
                    </div>
                    <div class="div-sobrenome div-inputs">
                        <input type="hidden" id="id" name="id" th:value="${cheio.id}" /><input type="hidden" name="id" th:value="${cheio.id}" />
                    </div>
                </div>
                <button type="submit">Atualizar cadastro</button>
            </fieldset>
        </form>
        <a th:href="@{/admin}">Voltar</a>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.js"></script>

<script>
    $(".cpf").mask("000.000.000-00", {
        reverse: true
    });

    $(".data-nascimento").mask("00/00/0000");
</script>

</body>
</html>
